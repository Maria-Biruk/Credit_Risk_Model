name: CI Pipeline

on:
  push:
    branches: [main, task-1, task-2]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run basic check
        run: |
          python -c "import pandas, numpy, sklearn; print('CI OK')"
